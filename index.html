<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>АФИША ГОРОДА</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.header{
background:#2c3e50;
color:white;
text-align:center;
padding:18px;
font-size:22px;
}

.container{
padding:15px;
}

.category{
background:white;
border-radius:14px;
padding:20px;
margin-bottom:12px;
font-size:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
АФИША ГОРОДА
</div>

<div class="container">

<div class="category">👶 Детские кружки</div>

<div class="category">🏫 Детские садики</div>

<div class="category">⚽ Спортивные секции</div>

<div class="category">💄 Для девушек</div>

<div class="category">🧔 Для мужчин</div>

<div class="category">🏢 Услуги бизнеса</div>

<div class="category">🧖 Сауны</div>

<div class="category">🚗 Ремонт авто</div>

</div>

<script>

Telegram.WebApp.expand();

document.querySelectorAll(".category").forEach(function(item){
    item.onclick = function(){
        alert("Здесь будет список объявлений");
    }
})

</script>

</body>
</html>
